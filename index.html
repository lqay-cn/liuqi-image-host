<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>流欺图床 · 幻境拾光</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, 'Helvetica Neue', sans-serif;
            overflow-x: hidden;
            position: relative;
        }

        /* 背景容器 - 双层实现联动平移动画 */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: transform 1.2s cubic-bezier(0.4, 0, 0.2, 1);
            filter: brightness(0.45) saturate(1.15);
        }

        .bg-layer.active {
            z-index: 2;
            transform: translate(0, 0);
        }

        .bg-layer.next {
            z-index: 1;
            transform: translate(0, 0);
        }

        /* 主内容 */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 24px 60px;
            position: relative;
            backdrop-filter: blur(3px);
        }

        /* 玻璃导航栏 */
        .glass-nav {
            background: rgba(25, 18, 40, 0.55);
            backdrop-filter: blur(16px);
            border-radius: 80px;
            padding: 12px 28px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border: 1px solid rgba(255, 215, 245, 0.5);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            animation: fadeInDown 0.6s ease;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #FFD0E8, #D8B2FF, #9AD8FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(255, 200, 230, 0.3);
        }

        .user-area {
            display: flex;
            gap: 16px;
            align-items: center;
            flex-wrap: wrap;
        }

        .glass-btn {
            background: rgba(255, 245, 240, 0.15);
            border: 1px solid rgba(255, 230, 200, 0.4);
            border-radius: 60px;
            padding: 8px 22px;
            color: #fff0e5;
            text-decoration: none;
            font-size: 0.9rem;
            backdrop-filter: blur(5px);
            transition: all 0.2s;
            cursor: pointer;
        }

        .glass-btn:hover {
            background: rgba(255, 200, 220, 0.3);
            transform: translateY(-2px);
        }

        /* 上传区域 */
        .upload-section {
            margin-bottom: 50px;
            animation: fadeInUp 0.6s ease;
        }

        .drop-zone {
            background: rgba(20, 15, 45, 0.65);
            backdrop-filter: blur(20px);
            border-radius: 56px;
            border: 2px dashed rgba(255, 183, 221, 0.7);
            padding: 35px 20px;
            text-align: center;
            transition: all 0.3s;
            cursor: pointer;
        }

        .drop-zone.drag-over {
            background: rgba(255, 150, 200, 0.25);
            border-color: #ff88cc;
            transform: scale(0.98);
        }

        .drop-icon {
            font-size: 3rem;
            margin-bottom: 12px;
        }

        .drop-text {
            color: #ffdfe8;
            font-size: 1.1rem;
            margin-bottom: 8px;
        }

        .drop-hint {
            color: rgba(255, 240, 250, 0.6);
            font-size: 0.8rem;
        }

        /* 预览网格 */
        .preview-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 25px 0 20px;
            max-height: 200px;
            overflow-y: auto;
            padding: 8px;
        }

        .preview-item {
            position: relative;
            width: 90px;
            height: 90px;
            border-radius: 20px;
            overflow: hidden;
            border: 2px solid rgba(255, 235, 200, 0.8);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
            animation: scaleIn 0.2s ease;
        }

        .preview-item:hover {
            transform: scale(1.05);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }

        .remove-preview {
            position: absolute;
            top: 2px;
            right: 2px;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            color: #ff99bb;
            text-align: center;
            line-height: 22px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: 0.2s;
            z-index: 10;
        }

        .remove-preview:hover {
            background: #ff4466;
            color: white;
        }

        /* 进度条样式 */
        .progress-wrapper {
            max-width: 400px;
            margin: 20px auto 0;
            display: none;
        }

        .progress-bar-container {
            background: rgba(30, 20, 50, 0.6);
            border-radius: 60px;
            height: 10px;
            overflow: hidden;
            backdrop-filter: blur(4px);
        }

        .progress-bar {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #ff9eb5, #b77cff);
            border-radius: 60px;
            transition: width 0.25s ease;
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, 
                transparent, 
                rgba(255, 255, 255, 0.3), 
                transparent);
            animation: shimmer 1.5s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .progress-text {
            font-size: 0.75rem;
            color: #ffd0e8;
            margin-top: 8px;
            text-align: center;
        }

        .upload-action-btn {
            background: linear-gradient(120deg, #ff9eb5, #b77cff);
            border: none;
            padding: 14px 40px;
            border-radius: 60px;
            font-size: 1.1rem;
            font-weight: bold;
            color: #1e1a2f;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.3);
            display: inline-block;
        }

        .upload-action-btn:hover:not(:disabled) {
            transform: translateY(-3px);
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.4);
        }

        .upload-action-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-wrapper {
            text-align: center;
            margin: 10px 0;
        }

        /* 图片网格 */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 28px;
            margin-top: 30px;
        }

        .img-card {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            overflow: hidden;
            border: 1px solid rgba(255, 235, 205, 0.5);
            transition: all 0.3s;
            animation: fadeInUp 0.4s ease;
        }

        .img-card:hover {
            transform: translateY(-8px);
            border-color: rgba(255, 180, 210, 0.8);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }

        .img-card img {
            width: 100%;
            aspect-ratio: 4/3;
            object-fit: cover;
            display: block;
        }

        .img-info {
            padding: 14px;
            color: #f0eef6;
            font-size: 0.85rem;
        }

        .img-name {
            font-weight: 600;
            margin-bottom: 6px;
            word-break: break-all;
        }

        .img-meta {
            font-size: 0.7rem;
            color: #ccbae8;
            display: flex;
            justify-content: space-between;
            margin-top: 6px;
        }

        .del-btn {
            background: rgba(220, 70, 90, 0.8);
            border: none;
            border-radius: 50px;
            padding: 5px 14px;
            color: white;
            cursor: pointer;
            font-size: 0.7rem;
            width: 100%;
            margin-top: 10px;
            transition: 0.2s;
        }

        .del-btn:hover {
            background: #ff4455;
        }

        .msg-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            padding: 12px 24px;
            border-radius: 60px;
            color: #ffd0e8;
            z-index: 100;
            font-size: 0.9rem;
            animation: fadeInUp 0.3s ease;
        }

        /* 动画 */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.8);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @media (max-width: 680px) {
            .glass-nav {
                flex-direction: column;
                gap: 12px;
                border-radius: 48px;
                padding: 16px 20px;
            }
            .logo {
                font-size: 1.4rem;
            }
            .container {
                padding: 16px;
            }
            .preview-item {
                width: 70px;
                height: 70px;
            }
            .image-grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 16px;
            }
        }
    </style>
</head>
<body>

<div class="bg-container">
    <div class="bg-layer active" id="bgCurrent"></div>
    <div class="bg-layer next" id="bgNext"></div>
</div>

<div class="container">
    <!-- 导航栏 -->
    <div class="glass-nav">
        <div class="logo">🎭 流欺图床 · 浮光掠影</div>
        <div class="user-area">
            <span id="usernameDisplay" style="color:#ffe0f0;">🌸 加载中</span>
            <a href="logout.php" class="glass-btn">🚪 退 出</a>
            <a href="admin.php" id="adminLink" class="glass-btn" style="display:none;">⚙ 管 理</a>
        </div>
    </div>

    <!-- 上传区域 -->
    <div class="upload-section">
        <div class="drop-zone" id="dropZone">
            <div class="drop-icon">📸✨</div>
            <div class="drop-text">拖拽图片至此区域</div>
            <div class="drop-hint">支持 JPG、PNG、GIF、WebP | 最多 8 张 | 单张 ≤8MB</div>
            <input type="file" id="fileInput" multiple accept="image/jpeg,image/png,image/gif,image/webp" style="display:none">
            <div class="preview-grid" id="previewGrid"></div>
            <div class="btn-wrapper" id="btnWrapper" style="display: none;">
                <button class="upload-action-btn" id="submitUpload">✨ 开始上传 ✨</button>
            </div>
            <!-- 进度条 -->
            <div class="progress-wrapper" id="progressWrapper">
                <div class="progress-bar-container">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-text" id="progressText">准备就绪</div>
            </div>
        </div>
    </div>

    <!-- 图片展示墙 -->
    <h3 style="color:#ffdfe8; margin: 20px 0 10px; letter-spacing: 1px;">✦ 流光画廊 ✦</h3>
    <div class="image-grid" id="imageGrid">
        <div style="text-align:center; padding:40px; color:#ccb5e8;">加载幻境中...</div>
    </div>
</div>

<script>
    // ==================== 背景联动平移替换动画 ====================
    const bgAPI = 'https://api.lqay.cn/api/zxsjt/?cat=heng';
    let isAnimating = false;
    let currentDirectionIndex = 0;
    
    const directions = [
        { name: '上', outTransform: 'translateY(-100%)', inStart: 'translateY(100%)', inEnd: 'translateY(0%)' },
        { name: '下', outTransform: 'translateY(100%)', inStart: 'translateY(-100%)', inEnd: 'translateY(0%)' },
        { name: '左', outTransform: 'translateX(-100%)', inStart: 'translateX(100%)', inEnd: 'translateX(0%)' },
        { name: '右', outTransform: 'translateX(100%)', inStart: 'translateX(-100%)', inEnd: 'translateX(0%)' }
    ];
    
    function preloadImage(url) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => resolve(url);
            img.onerror = () => reject(url);
            img.src = url;
        });
    }
    
    function getNewBgUrl() {
        return `${bgAPI}&_=${Date.now()}`;
    }
    
    async function initBackground() {
        const url1 = getNewBgUrl();
        const url2 = getNewBgUrl();
        try {
            await Promise.all([preloadImage(url1), preloadImage(url2)]);
            const currentLayer = document.getElementById('bgCurrent');
            const nextLayer = document.getElementById('bgNext');
            currentLayer.style.backgroundImage = `url('${url1}')`;
            nextLayer.style.backgroundImage = `url('${url2}')`;
            currentLayer.style.transform = 'translate(0, 0)';
            nextLayer.style.transform = 'translate(0, 0)';
        } catch(e) {
            console.warn('背景预加载失败');
            document.getElementById('bgCurrent').style.background = '#1a0e2e';
        }
    }
    
    async function switchBackground() {
        if (isAnimating) return;
        isAnimating = true;
        
        const currentLayer = document.getElementById('bgCurrent');
        const nextLayer = document.getElementById('bgNext');
        const dir = directions[currentDirectionIndex % directions.length];
        currentDirectionIndex++;
        
        const newUrl = getNewBgUrl();
        try {
            await preloadImage(newUrl);
            
            nextLayer.style.transition = 'none';
            nextLayer.style.transform = dir.inStart;
            nextLayer.style.backgroundImage = `url('${newUrl}')`;
            
            nextLayer.offsetHeight;
            
            nextLayer.style.transition = 'transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
            currentLayer.style.transition = 'transform 1.2s cubic-bezier(0.4, 0, 0.2, 1)';
            
            currentLayer.style.transform = dir.outTransform;
            nextLayer.style.transform = dir.inEnd;
            
            setTimeout(() => {
                currentLayer.style.transition = '';
                currentLayer.style.transform = '';
                const nextBg = nextLayer.style.backgroundImage;
                currentLayer.style.backgroundImage = nextBg;
                nextLayer.style.transition = '';
                nextLayer.style.transform = '';
                isAnimating = false;
            }, 1250);
        } catch(e) {
            console.warn('背景切换失败');
            isAnimating = false;
        }
    }
    
    initBackground();
    setInterval(() => {
        if (!isAnimating) switchBackground();
    }, 5000);
    
    // ==================== 用户状态与图片管理 ====================
    let selectedFiles = [];
    const MAX_FILES = 8;
    let currentUser = null;
    let isAdmin = false;
    let previewUrls = [];
    
    async function fetchUser() {
        const res = await fetch('get_user.php');
        const data = await res.json();
        if (!data.username) {
            window.location.href = 'login.html';
            return;
        }
        currentUser = data.username;
        isAdmin = data.is_admin;
        document.getElementById('usernameDisplay').innerHTML = `🌸 ${escapeHtml(currentUser)}`;
        if (isAdmin) {
            document.getElementById('adminLink').style.display = 'inline-block';
        }
    }
    
    async function loadImages() {
        const res = await fetch('get_images.php');
        const images = await res.json();
        const grid = document.getElementById('imageGrid');
        if (!images.length) {
            grid.innerHTML = '<div style="text-align:center; padding:60px; color:#ccb5e8;">✨ 画廊空空如也，拖拽图片上传吧 ✨</div>';
            return;
        }
        grid.innerHTML = images.map(img => `
            <div class="img-card">
                <img src="uploads/${encodeURIComponent(img.filename)}" loading="lazy" alt="${escapeHtml(img.name)}">
                <div class="img-info">
                    <div class="img-name">📷 ${escapeHtml(img.name)}</div>
                    <div class="img-meta">
                        <span>👤 ${escapeHtml(img.uploader)}</span>
                        <span>📅 ${img.time}</span>
                    </div>
                    ${isAdmin || img.uploader === currentUser ? 
                        `<button class="del-btn" data-id="${escapeHtml(img.id)}">🗑️ 删除</button>` : ''}
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.del-btn').forEach(btn => {
            btn.onclick = () => deleteImage(btn.dataset.id);
        });
    }
    
    async function deleteImage(id) {
        if (!confirm('确定要删除这张图片吗？')) return;
        const res = await fetch(`admin.php?del_id=${encodeURIComponent(id)}`);
        if (res.ok) {
            showToast('✨ 删除成功');
            loadImages();
        } else {
            showToast('❌ 删除失败');
        }
    }
    
    function showToast(msg) {
        let toast = document.querySelector('.msg-toast');
        if (toast) toast.remove();
        toast = document.createElement('div');
        toast.className = 'msg-toast';
        toast.textContent = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2500);
    }
    
    // 进度条控制函数
    function showProgress(show, percent = 0, text = '') {
        const wrapper = document.getElementById('progressWrapper');
        const bar = document.getElementById('progressBar');
        const textEl = document.getElementById('progressText');
        
        if (show) {
            wrapper.style.display = 'block';
            bar.style.width = percent + '%';
            if (text) textEl.textContent = text;
        } else {
            wrapper.style.display = 'none';
            bar.style.width = '0%';
            textEl.textContent = '准备就绪';
        }
    }
    
    function updateProgress(percent, text) {
        const bar = document.getElementById('progressBar');
        const textEl = document.getElementById('progressText');
        bar.style.width = percent + '%';
        if (text) textEl.textContent = text;
    }
    
    function updatePreview() {
        const container = document.getElementById('previewGrid');
        const btnWrapper = document.getElementById('btnWrapper');
        
        container.innerHTML = '';
        
        if (selectedFiles.length === 0) {
            btnWrapper.style.display = 'none';
            previewUrls.forEach(url => URL.revokeObjectURL(url));
            previewUrls = [];
            return;
        }
        
        selectedFiles.forEach((file, idx) => {
            const url = URL.createObjectURL(file);
            previewUrls.push(url);
            
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = `
                <img src="${url}">
                <div class="remove-preview" data-idx="${idx}">✕</div>
            `;
            container.appendChild(div);
        });
        
        btnWrapper.style.display = 'block';
        
        document.querySelectorAll('.remove-preview').forEach(btn => {
            btn.removeEventListener('click', handleRemove);
            btn.addEventListener('click', handleRemove);
        });
    }
    
    function handleRemove(e) {
        e.stopPropagation();
        const idx = parseInt(this.dataset.idx);
        if (!isNaN(idx) && idx >= 0 && idx < selectedFiles.length) {
            selectedFiles.splice(idx, 1);
            updatePreview();
        }
    }
    
    function addFiles(files) {
        let newFiles = Array.from(files).filter(f => f.type.startsWith('image/'));
        if (selectedFiles.length + newFiles.length > MAX_FILES) {
            showToast(`最多上传 ${MAX_FILES} 张，当前已有 ${selectedFiles.length} 张`);
            newFiles = newFiles.slice(0, MAX_FILES - selectedFiles.length);
        }
        if (newFiles.length > 0) {
            selectedFiles.push(...newFiles);
            updatePreview();
        }
    }
    
    // 带进度条的上传函数
    async function uploadImages() {
        if (selectedFiles.length === 0) {
            showToast('请先选择图片');
            return;
        }
        
        const formData = new FormData();
        for (let file of selectedFiles) {
            formData.append('images[]', file);
        }
        
        const btn = document.getElementById('submitUpload');
        const originalText = btn.textContent;
        btn.textContent = '⏳ 上传中...';
        btn.disabled = true;
        
        // 显示进度条
        showProgress(true, 0, '正在准备上传...');
        
        // 使用 XMLHttpRequest 来实现进度追踪
        const xhr = new XMLHttpRequest();
        
        // 监听上传进度
        xhr.upload.addEventListener('progress', (e) => {
            if (e.lengthComputable) {
                const percentComplete = Math.round((e.loaded / e.total) * 100);
                updateProgress(percentComplete, `上传中 ${percentComplete}%`);
            }
        });
        
        // 监听完成
        xhr.addEventListener('load', () => {
            if (xhr.status === 200) {
                try {
                    const result = JSON.parse(xhr.responseText);
                    if (result.success > 0) {
                        showToast(`✅ 成功上传 ${result.success} 张图片`);
                        // 清空选中的文件
                        selectedFiles = [];
                        previewUrls.forEach(url => URL.revokeObjectURL(url));
                        previewUrls = [];
                        updatePreview();
                        loadImages();
                        updateProgress(100, '上传完成！');
                        setTimeout(() => {
                            showProgress(false);
                        }, 1500);
                    }
                    if (result.errors && result.errors.length) {
                        showToast(`⚠️ ${result.errors.join(', ')}`);
                    }
                } catch (err) {
                    showToast('❌ 上传失败，服务器响应异常');
                    showProgress(false);
                }
            } else {
                showToast('❌ 上传失败，请重试');
                showProgress(false);
            }
            btn.textContent = originalText;
            btn.disabled = false;
        });
        
        // 监听错误
        xhr.addEventListener('error', () => {
            showToast('❌ 网络错误，请重试');
            showProgress(false);
            btn.textContent = originalText;
            btn.disabled = false;
        });
        
        // 发送请求
        xhr.open('POST', 'upload.php');
        xhr.send(formData);
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ==================== 事件绑定 ====================
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const submitBtn = document.getElementById('submitUpload');
    
    dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('drag-over');
    });
    
    dropZone.addEventListener('dragleave', () => {
        dropZone.classList.remove('drag-over');
    });
    
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('drag-over');
        addFiles(e.dataTransfer.files);
    });
    
    dropZone.addEventListener('click', (e) => {
        if (e.target.classList.contains('remove-preview')) {
            return;
        }
        if (e.target.id === 'submitUpload' || e.target.closest('#submitUpload')) {
            return;
        }
        fileInput.click();
    });
    
    submitBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        uploadImages();
    });
    
    fileInput.addEventListener('change', (e) => {
        addFiles(e.target.files);
        fileInput.value = '';
    });
    
    fetchUser().then(() => {
        loadImages();
    });
</script>
</body>
</html>
